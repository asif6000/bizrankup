<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BizRank - Premium Beauty & Cosmetics eCommerce Platform" />
    <meta name="theme-color" content="#FF4F8B" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>BizRank - Premium Beauty & Cosmetics</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (theme === 'dark' || (!theme && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
        document.documentElement.style.backgroundColor = document.documentElement.classList.contains('dark') ? '#0F1117' : '#FAFAFA';
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="splash" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:inherit;">
        <div style="width:32px;height:32px;border:3px solid #FF4F8B;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      (function(){try{var t=localStorage.getItem('theme'),p=window.matchMedia('(prefers-color-scheme:dark)').matches,d=t==='dark'||(!t&&p);if(d)document.documentElement.classList.add('dark');var c=d?'#0F1117':'#FAFAFA';document.documentElement.style.backgroundColor=c;document.body.style.backgroundColor=c;}catch(e){}})();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
